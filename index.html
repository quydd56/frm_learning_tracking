<!DOCTYPE html>
<html>
<head>
  <title>FRM Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: Arial; display: flex; }

    #table-container { width: 70%; }
    #sidebar { width: 30%; padding: 20px; }

    table { border-collapse: collapse; width: 100%; }
    td, th { border: 1px solid #ddd; padding: 6px; }

    .level-1 { padding-left: 10px; }
    .level-2 { padding-left: 30px; }
    .level-3 { padding-left: 50px; }

    .toggle { cursor: pointer; font-weight: bold; }
    .hidden { display: none; }
  </style>
</head>

<body>

<div id="table-container">
  <h3>FRM Study Plan</h3>
  <table id="data-table">
    <thead>
      <tr>
        <th>Topic</th>
        <th>Status</th>
        <th>Progress</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<div id="sidebar">
  <h3>Summary</h3>
  <canvas id="chart"></canvas>
  <div id="kpi"></div>
</div>

<script src="script.js"></script>

</body>
</html>
