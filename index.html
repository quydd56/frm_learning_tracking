<!DOCTYPE html>
<html>
<head>
  <title>FRM Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      display: flex;
      margin: 0;
    }

    #left {
      width: 70%;
      padding: 20px;
    }

    #right {
      width: 30%;
      padding: 20px;
      border-left: 1px solid #ddd;
      background: #fafafa;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    td, th {
      padding: 8px;
      border-bottom: 1px solid #eee;
    }

    tr:hover {
      background: #f5f5f5;
    }

    .level-1 { padding-left: 10px; font-weight: bold; }
    .level-2 { padding-left: 30px; }
    .level-3 { padding-left: 50px; color: #666; }

    .toggle {
      cursor: pointer;
      margin-right: 5px;
      color: #007bff;
    }

    .hidden {
      display: none;
    }

    .done {
      color: green;
    }

    .todo {
      color: red;
    }
  </style>
</head>

<body>

<div id="left">
  <h2>FRM Learning Tracker</h2>

  <table>
    <thead>
      <tr>
        <th>Topic</th>
        <th>Status</th>
        <th>Progress</th>
      </tr>
    </thead>
    <tbody id="table-body"></tbody>
  </table>
</div>

<div id="right">
  <h3>Summary</h3>
  <canvas id="chart"></canvas>
  <p id="kpi"></p>
</div>

<script src="script.js"></script>

</body>
</html>
